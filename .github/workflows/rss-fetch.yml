name: Data Source Fetcher

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-rss.js'
      - '.github/workflows/rss-fetch.yml'
  schedule:
    # 每4小时执行一次 (UTC时间: 0, 4, 8, 12, 16, 20 | 北京时间: 8, 12, 16, 20, 0, 4)
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install rss-parser cheerio

    - name: Fetch all data sources
      run: node scripts/fetch-rss.js

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || git commit -m "🔄 Auto-update all data sources $(date '+%Y-%m-%d %H:%M:%S')"
        git push
